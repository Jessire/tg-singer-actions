on:
  schedule:
    - cron: '30 06 * * *'
  workflow_dispatch:
permissions:
  actions: write
  contents: write
jobs:
  sign-job:
    name: sign-job-name
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: install tg-signer
      run: |
        pip3 install tg-signer
    - name: warm up peers
      env:
        SESSION_STRING: ${{ secrets.SESSION_STRING }}
      run: |
        python3 << 'PYEOF'
        import asyncio, os
        from pyrogram import Client

        async def main():
            async with Client(
                "my_account",
                session_string=os.environ["SESSION_STRING"],
                in_memory=True,
            ) as app:
                for username in ["@okemby_bot", "@peach_emby_bot", "@emospg_bot", "@EmbyPublicBot"]:
                    try:
                        chat = await app.get_chat(username)
                        print(f"✅ {username} -> id={chat.id}")
                    except Exception as e:
                        print(f"❌ {username} -> {e}")

        asyncio.run(main())
        PYEOF
    - name: sign
      env:
        SESSION_STRING: ${{ secrets.SESSION_STRING }}
        TASK_MAP: ${{ secrets.TASK_MAP }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      run: |
        echo "$TASK_MAP" | jq -r 'to_entries[] | "\(.key)\t\(.value | tojson)"' | while IFS=$'\t' read -r key value_json; do
            task_path=".signer/signs/${key}"
            mkdir -p ${task_path}
            config_name="${task_path}/config.json"
            echo "$value_json" | jq . > "$config_name"
            tg-signer --session-string "$SESSION_STRING" run-once ${key}
        done
    - name: 自动续命Actions(防止60天禁用action)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git commit --allow-empty -m "auto keep actions alive (no code change)"
        git push origin main
