on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tg-signer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sign-job:
    name: sign-job-name
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: install tg-signer with native AI vision actions
        env:
          TG_SIGNER_REPO: ${{ vars.TG_SIGNER_REPO }}
          TG_SIGNER_REF: ${{ vars.TG_SIGNER_REF }}
        run: |
          set -euo pipefail
          repo="${TG_SIGNER_REPO:-https://github.com/Jessire/TG-SignPulse.git}"
          ref="${TG_SIGNER_REF:-main}"
          echo "Installing tg-signer from ${repo}@${ref}"
          python -m pip install --upgrade pip
          pip3 install --force-reinstall "git+${repo}@${ref}"
          tg-signer version

      - name: sign
        env:
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          TASK_MAP: ${{ secrets.TASK_MAP }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          AI_VISION_TIMEOUT: ${{ vars.AI_VISION_TIMEOUT || '20' }}
          SIGN_TASK_ACTION_TIMEOUT: ${{ vars.SIGN_TASK_ACTION_TIMEOUT || '40' }}
          TG_SIGNER_NUM_OF_DIALOGS: ${{ vars.TG_SIGNER_NUM_OF_DIALOGS }}
          SIGN_TASK_FLOW_RETRY_ATTEMPTS: ${{ vars.SIGN_TASK_FLOW_RETRY_ATTEMPTS || '1' }}
          SIGN_TASK_RETRY_BACKOFF_STEPS: ${{ vars.SIGN_TASK_RETRY_BACKOFF_STEPS || '0' }}
        run: |
          set -euo pipefail
          num_of_dialogs="${TG_SIGNER_NUM_OF_DIALOGS:-500}"
          overall_status=0
          echo "Using tg-signer --num-of-dialogs ${num_of_dialogs}"
          while IFS=$'\t' read -r key value_json; do
              task_path=".signer/signs/${key}"
              mkdir -p "${task_path}"
              config_name="${task_path}/config.json"
              log_file="${task_path}/tg-signer.log"
              echo "$value_json" | jq . > "$config_name"
              echo "Running task ${key}"
              set +e
              tg-signer --session-string "$SESSION_STRING" run-once --num-of-dialogs "$num_of_dialogs" "${key}" 2>&1 | tee "$log_file"
              signer_status=${PIPESTATUS[0]}
              set -e
              if [ "$signer_status" -ne 0 ]; then
                  echo "::error title=Task ${key} failed::tg-signer exited with status ${signer_status}."
                  overall_status=1
                  continue
              fi
              # Only fail on terminal signer/AI errors, not transient retry warnings that later recover.
              set +e
              grep -E "PEER_ID_INVALID|PeerIdInvalid|Action did not complete|AI .* failed|AI did not return|object has no attribute|Could not parse AI option|AI result does not contain an option|TimeoutError|AI .*失败|AI 未返回" "$log_file" >/dev/null
              log_scan_status=$?
              set -e
              if [ "$log_scan_status" -eq 0 ]; then
                  echo "::error title=Task ${key} reported terminal errors::Check TASK_MAP chat_id/actions/session/AI settings."
                  overall_status=1
                  continue
              fi
          done < <(echo "$TASK_MAP" | jq -r 'to_entries[] | "\(.key)\t\(.value | tojson)"')
          exit "$overall_status"
