on:
  schedule:
    - cron: '10 0 */1 * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  sign-job:
    name: sign-job-name
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: install tg-signer
        run: pip3 install "git+https://github.com/amchii/tg-signer.git@main"

      - name: patch tg-signer image handling
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from textwrap import dedent, indent

          import tg_signer.ai_tools as ai_tools_module
          import tg_signer.core as core_module

          ai_tools_path = Path(ai_tools_module.__file__)
          ai_tools_text = ai_tools_path.read_text(encoding="utf-8")
          if "async def read_text_from_image" not in ai_tools_text:
              ai_insert = dedent(r'''
                  async def read_text_from_image(
                      self,
                      image: bytes,
                      query: str = "Read the captcha or answer in the image. Return only the text to send to the bot.",
                      client: "AsyncOpenAI" = None,
                      model: str = None,
                      temperature=0.1,
                  ) -> str:
                      sys_prompt = "You are an OCR assistant. Output only the captcha, answer, or text that should be sent to the bot. Do not explain."
                      client = client or self.client
                      model = model or self.default_model
                      messages = [
                          {"role": "system", "content": sys_prompt},
                          {
                              "role": "user",
                              "content": [
                                  {"type": "text", "text": query},
                                  {
                                      "type": "image_url",
                                      "image_url": {
                                          "url": f"data:image/jpeg;base64,{encode_image(image)}"
                                      },
                                  },
                              ],
                          },
                      ]
                      completion = await client.chat.completions.create(
                          messages=messages,
                          model=model,
                          stream=False,
                          temperature=temperature,
                      )
                      return completion.choices[0].message.content.strip()

              ''').lstrip("\n")
              ai_insert = indent(ai_insert, "    ")
              ai_tools_text = ai_tools_text.replace(
                  "    async def calculate_problem(\n",
                  ai_insert + "    async def calculate_problem(\n",
                  1,
              )
              ai_tools_path.write_text(ai_tools_text, encoding="utf-8")

          core_path = Path(core_module.__file__)
          core_text = core_path.read_text(encoding="utf-8")
          start = core_text.index("    async def _choose_option_by_image(")
          end = core_text.index("\n    async def wait_for(", start)
          replacement = dedent(r'''
              async def _choose_option_by_image(
                  self,
                  action: ChooseOptionByImageAction,
                  message,
                  previous_messages: list[Message] = None,
              ):
                  buttons = _get_inline_keyboard_buttons(message)
                  message_text = _get_message_text(message)
                  done_markers = (
                      "\u5df2\u7b7e\u5230",
                      "\u5df2\u7528\u5b8c",
                      "\u4e0d\u8981\u91cd\u590d\u7b7e\u5230",
                      "\u7b7e\u5230\u673a\u4f1a\u5df2\u7528\u5b8c",
                  )
                  if not buttons and message_text and any(marker in message_text for marker in done_markers):
                      self.log("Detected already-signed text; skipping image choice")
                      return True

                  photo_message = message if getattr(message, "photo", None) else None
                  if buttons and not photo_message and previous_messages:
                      photo_message = self._find_previous_photo_message(previous_messages, message)
                  elif not buttons and not photo_message and previous_messages and message_text:
                      image_text_markers = (
                          "\u9a8c\u8bc1\u7801",
                          "\u56fe\u7247",
                          "\u56fe\u4e2d",
                          "\u8bf7\u8f93\u5165",
                          "\u56de\u590d",
                          "captcha",
                          "verify",
                          "code",
                      )
                      if any(marker in message_text.lower() for marker in image_text_markers):
                          photo_message = self._find_previous_photo_message(previous_messages, message)

                  if photo_message and photo_message.photo:
                      self.log("Detected image; calling AI vision")
                      image_buffer: BinaryIO = await self.app.download_media(
                          photo_message.photo.file_id, in_memory=True
                      )
                      image_buffer.seek(0)
                      image_bytes = image_buffer.read()

                      if buttons:
                          options = [btn.text for btn in buttons]
                          query = message_text or _get_message_text(photo_message) or "Choose the correct option"
                          try:
                              result_index = await self.get_ai_tools().choose_option_by_image(
                                  image_bytes,
                                  query,
                                  list(enumerate(options)),
                              )
                          except Exception as exc:
                              self.log(f"AI image option selection failed: {exc}", level="WARNING")
                              return False
                          if result_index < 0 or result_index >= len(buttons):
                              self.log("AI returned an invalid option index", level="WARNING")
                              return False
                          target_btn = buttons[result_index]
                          self.log(f"AI selected: {target_btn.text}")
                          if not target_btn.callback_data:
                              self.log("Matched button has no callback_data", level="WARNING")
                              return False
                          await self.request_callback_answer(
                              self.app,
                              message.chat.id,
                              message.id,
                              target_btn.callback_data,
                          )
                          return True

                      query = _get_message_text(photo_message) or message_text or "Read the captcha or answer in the image. Return only the text to send to the bot."
                      try:
                          answer = await self.get_ai_tools().read_text_from_image(image_bytes, query)
                      except Exception as exc:
                          self.log(f"AI image text extraction failed: {exc}", level="WARNING")
                          return False
                      answer = answer.strip()
                      self.log(f"AI text result: {answer}")
                      if not answer:
                          self.log("AI did not return text to send", level="WARNING")
                          return False
                      await self.send_message(
                          message.chat.id,
                          answer,
                          message_thread_id=getattr(message, "message_thread_id", None),
                      )
                      return True
                  return False
          ''').lstrip("\n")
          replacement = indent(replacement, "    ")
          core_text = core_text[:start] + replacement + core_text[end:]
          core_path.write_text(core_text, encoding="utf-8")
          print(f"patched {ai_tools_path}")
          print(f"patched {core_path}")
          PY

      - name: sign
        env:
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          TASK_MAP: ${{ secrets.TASK_MAP }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          set -euo pipefail
          echo "$TASK_MAP" | jq -r 'to_entries[] | "\(.key)\t\(.value | tojson)"' | while IFS=$'\t' read -r key value_json; do
              task_path=".signer/signs/${key}"
              mkdir -p "${task_path}"
              config_name="${task_path}/config.json"
              echo "$value_json" | jq . > "$config_name"
              tg-signer --session-string "$SESSION_STRING" run-once "${key}"
          done

      - name: keep-actions-alive
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "auto keep actions alive (no code change)"
          git push origin main
