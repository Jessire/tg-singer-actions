on:
  schedule:
    - cron: '10 0 */1 * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  sign-job:
    name: sign-job-name
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: install tg-signer
        run: pip3 install tg-signer

      - name: patch tg-signer runtime
        run: |
          python - <<'PY'
          import re
          import site
          from pathlib import Path

          package_dir = Path(site.getsitepackages()[0]) / "tg_signer"
          ai_tools_path = package_dir / "ai_tools.py"
          core_path = package_dir / "core.py"

          ai_tools_text = ai_tools_path.read_text(encoding="utf-8")
          new_prompt = (
              'sys_prompt = """You are a Telegram sign-in captcha solver. Read the image carefully and choose the single best option from the provided candidates.\\n'
              'Rules:\\n'
              '1. Focus on the actual content inside the image, such as Chinese characters, numbers, letters, colors, objects, positions, or captcha text.\\n'
              '2. Ignore decorative emoji, numbering, and punctuation in button labels. Match the core meaning.\\n'
              '3. If the image asks for the matching option, choose the option whose meaning is the closest exact match to the image.\\n'
              '4. If no option is perfect, still choose the closest one.\\n'
              'Reply only as JSON:\\n'
              '{\\n'
              '  "option": 0,\\n'
              '  "reason": "short reason"\\n'
              '}\\n'
              '"""\\n'
              '        client = client or self.client'
          )
          ai_tools_text, ai_prompt_count = re.subn(
              r'sys_prompt = """[\s\S]*?client = client or self\.client',
              new_prompt,
              ai_tools_text,
              count=1,
          )
          new_query = (
              'text_query = (\\n'
              '            "Task: solve the Telegram sign-in image challenge.\\\\n"\\n'
              '            f"Question or context: {query}\\\\n"\\n'
              '            f"Candidates: {json.dumps(options, ensure_ascii=False)}\\\\n"\\n'
              '            "Return the zero-based index of the best candidate."\\n'
              '        )\\n'
              '        messages = ['
          )
          ai_tools_text, ai_query_count = re.subn(
              r'text_query = f".*?"\n        messages = \[',
              new_query,
              ai_tools_text,
              count=1,
          )
          if ai_prompt_count != 1 or ai_query_count != 1:
              raise SystemExit("Failed to patch tg_signer/ai_tools.py")
          ai_tools_path.write_text(ai_tools_text, encoding="utf-8")

          core_text = core_path.read_text(encoding="utf-8")
          new_core = (
              '        text = _get_message_text(message) or ""\\n'
              '        terminal_phrases = (\\n'
              '            "\\\\u5df2\\\\u7b7e\\\\u5230",\\n'
              '            "\\\\u4e0d\\\\u8981\\\\u91cd\\\\u590d\\\\u7b7e\\\\u5230",\\n'
              '            "\\\\u7b7e\\\\u5230\\\\u673a\\\\u4f1a\\\\u5df2\\\\u7528\\\\u5b8c",\\n'
              '            "\\\\u4eca\\\\u5929\\\\u5df2\\\\u7b7e\\\\u5230",\\n'
              '            "\\\\u5df2\\\\u7ecf\\\\u7b7e\\\\u5230",\\n'
              '        )\\n'
              '        if any(phrase in text for phrase in terminal_phrases):\\n'
              '            self.log(f"Detected terminal sign-in message, skip image solving: {text}")\\n'
              '            return True\\n\\n'
              '        buttons = _get_inline_keyboard_buttons(message)\\n'
              '        photo_message = message\\n'
          )
          core_text, core_count = re.subn(
              r'        buttons = _get_inline_keyboard_buttons\(message\)\n        photo_message = message\n',
              new_core,
              core_text,
              count=1,
          )
          if core_count != 1:
              raise SystemExit("Failed to patch tg_signer/core.py")
          core_path.write_text(core_text, encoding="utf-8")

          print("Patched tg-signer runtime successfully.")
          PY

      - name: sign
        env:
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          TASK_MAP: ${{ secrets.TASK_MAP }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          set -euo pipefail
          while IFS=$'\t' read -r key value_json; do
              task_path=".signer/signs/${key}"
              mkdir -p "${task_path}"
              config_name="${task_path}/config.json"
              echo "$value_json" | jq . > "$config_name"
              tg-signer --session-string "$SESSION_STRING" run-once "${key}"
          done < <(echo "$TASK_MAP" | jq -r 'to_entries[] | "\(.key)\t\(.value | tojson)"')

      - name: keep-actions-alive
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "auto keep actions alive (no code change)"
          git push origin main
