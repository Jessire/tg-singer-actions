on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tg-signer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sign-job:
    name: sign-job-name
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: install tg-signer with native AI vision actions
        env:
          TG_SIGNER_REPO: ${{ vars.TG_SIGNER_REPO }}
          TG_SIGNER_REF: ${{ vars.TG_SIGNER_REF }}
        run: |
          set -euo pipefail
          repo="${TG_SIGNER_REPO:-https://github.com/Jessire/TG-SignPulse.git}"
          ref="${TG_SIGNER_REF:-main}"
          echo "Installing tg-signer from ${repo}@${ref}"
          python -m pip install --upgrade pip
          pip3 install --force-reinstall "git+${repo}@${ref}"
          tg-signer version

      - name: sign
        env:
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          TASK_MAP: ${{ secrets.TASK_MAP }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          AI_VISION_TIMEOUT: ${{ vars.AI_VISION_TIMEOUT || '20' }}
          AI_VISION_RETRY_ATTEMPTS: ${{ vars.AI_VISION_RETRY_ATTEMPTS || '3' }}
          AI_VISION_RETRY_DELAY: ${{ vars.AI_VISION_RETRY_DELAY || '0.6' }}
          SIGN_TASK_ACTION_TIMEOUT: ${{ vars.SIGN_TASK_ACTION_TIMEOUT || '40' }}
          TG_SIGNER_NUM_OF_DIALOGS: ${{ vars.TG_SIGNER_NUM_OF_DIALOGS }}
          SIGN_TASK_FLOW_RETRY_ATTEMPTS: '1'
          SIGN_TASK_RETRY_BACKOFF_STEPS: '0'
          ALLOW_PARTIAL_CHAT_FAILURES: ${{ vars.ALLOW_PARTIAL_CHAT_FAILURES || 'true' }}
        run: |
          set -euo pipefail
          num_of_dialogs="${TG_SIGNER_NUM_OF_DIALOGS:-500}"
          overall_status=0
          echo "Using tg-signer --num-of-dialogs ${num_of_dialogs}"
          while IFS=$'\t' read -r key value_json; do
              task_path=".signer/signs/${key}"
              mkdir -p "${task_path}"
              config_name="${task_path}/config.json"
              log_file="${task_path}/tg-signer.log"
              echo "$value_json" | jq . > "$config_name"
              echo "Running task ${key}"
              set +e
              tg-signer --session-string "$SESSION_STRING" run-once --num-of-dialogs "$num_of_dialogs" "${key}" 2>&1 | tee "$log_file"
              signer_status=${PIPESTATUS[0]}
              set -e
              # Only fail on global signer/auth errors, not transient per-chat failures or retry warnings.
              set +e
              grep -E "SESSION_REVOKED|AUTH_KEY_UNREGISTERED|API_ID_INVALID|PHONE_CODE_INVALID|PHONE_NUMBER_INVALID|SESSION_PASSWORD_NEEDED|AuthenticationError|PermissionDeniedError" "$log_file" >/dev/null
              global_error_scan_status=$?
              chat_start_count=$(grep -Ec "开始执行任务对象:" "$log_file")
              chat_failure_count=$(grep -Ec "Sign chat failed for chat_id=" "$log_file")
              if [ "$chat_failure_count" -eq 0 ]; then
                  chat_failure_count=$(grep -Ec "签到失败: .*chat_id=" "$log_file")
              fi
              set -e
              if [ "$global_error_scan_status" -eq 0 ]; then
                  echo "::error title=Task ${key} reported global errors::Check SESSION_STRING and AI provider settings."
                  overall_status=1
                  continue
              fi
              if [ "${ALLOW_PARTIAL_CHAT_FAILURES,,}" != "false" ] && [ "$signer_status" -ne 0 ] && [ "$chat_failure_count" -gt 0 ] && [ "$chat_start_count" -gt "$chat_failure_count" ]; then
                  echo "::warning title=Task ${key} had partial chat failures::At least one chat failed, but other configured chats completed. Check ${log_file} for the failed chat_id."
                  continue
              fi
              if [ "$signer_status" -ne 0 ]; then
                  echo "::error title=Task ${key} failed::tg-signer exited with status ${signer_status}."
                  overall_status=1
                  continue
              fi
          done < <(echo "$TASK_MAP" | jq -r 'to_entries[] | "\(.key)\t\(.value | tojson)"')
          exit "$overall_status"
