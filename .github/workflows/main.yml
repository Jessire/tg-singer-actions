on:
  schedule:
    - cron: '10 0 */1 * *'
  workflow_dispatch:
permissions:
  actions: write
  contents: write
jobs:
  sign-job:
    name: sign-job-name
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v5
      with:
        persist-credentials: true
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: install dependencies
      run: pip3 install tg-signer openai
    - name: sign
      env:
        SESSION_STRING: ${{ secrets.SESSION_STRING }}
        TASK_MAP: ${{ secrets.TASK_MAP }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      run: |
        python3 << 'PYEOF'
        import asyncio, base64, json, os, traceback
        from pyrogram import Client
        from pyrogram.handlers import EditedMessageHandler, MessageHandler

        SESSION_STRING = os.environ["SESSION_STRING"]
        TASK_MAP       = json.loads(os.environ["TASK_MAP"])
        OPENAI_API_KEY = os.environ.get("OPENAI_API_KEY", "")
        OPENAI_BASE_URL = os.environ.get("OPENAI_BASE_URL") or None
        OPENAI_MODEL   = os.environ.get("OPENAI_MODEL", "gemini-2.5-flash")
        AI_ENABLED     = bool(OPENAI_API_KEY.strip())

        BOT_USERNAMES  = ["@okemby_bot", "@peach_emby_bot", "@emospg_bot", "@EmbyPublicBot"]
        msg_queues     = {}   # chat_id -> asyncio.Queue

        class SignFailure(RuntimeError):
            pass

        class SoftSignWarning(RuntimeError):
            pass

        # Global message routing
        async def _on_msg(client, message):
            q = msg_queues.get(message.chat.id)
            if q:
                await q.put(message)

        # Wait for the next message from a specific chat
        async def next_msg(chat_id, timeout=45, need_photo=False, need_markup=False):
            q = msg_queues.setdefault(chat_id, asyncio.Queue())
            deadline = asyncio.get_event_loop().time() + timeout
            while True:
                left = deadline - asyncio.get_event_loop().time()
                if left <= 0:
                    return None
                try:
                    msg = await asyncio.wait_for(q.get(), timeout=max(left, 0.1))
                    if need_photo and not has_image_media(msg):
                        continue
                    if need_markup and not get_buttons(msg.reply_markup):
                        continue
                    return msg
                except asyncio.TimeoutError:
                    return None

        # Helpers
        def get_buttons(markup):
            if not markup:
                return []
            if hasattr(markup, "inline_keyboard"):
                return [btn.text for row in markup.inline_keyboard for btn in row]
            if hasattr(markup, "keyboard"):
                return [btn.text for row in markup.keyboard for btn in row]
            return []

        def is_ai_action(action):
            try:
                return int(action.get("action", -1)) == 4
            except (TypeError, ValueError):
                return False

        def has_image_media(msg):
            if not msg:
                return False
            if getattr(msg, "photo", None):
                return True
            doc = getattr(msg, "document", None)
            if doc and getattr(doc, "mime_type", "").startswith("image/"):
                return True
            return False

        async def click_btn(app, msg, text):
            markup = msg.reply_markup
            if not markup:
                return None
            if hasattr(markup, "inline_keyboard"):
                for row in markup.inline_keyboard:
                    for btn in row:
                        if text in btn.text or btn.text in text:
                            try:
                                await msg.click(btn.text)
                                return btn.text
                            except Exception as e:
                                if "GetBotCallbackAnswer" in str(e):
                                    raise SoftSignWarning(
                                        f"Button '{btn.text}' callback timed out; continue and wait for follow-up messages"
                                    ) from e
                                raise SignFailure(f"Failed to click button '{btn.text}': {e}") from e
            if hasattr(markup, "keyboard"):          # Reply keyboard
                for row in markup.keyboard:
                    for btn in row:
                        if text in btn.text or btn.text in text:
                            await app.send_message(msg.chat.id, btn.text)
                            return btn.text
            return None

        async def ai_pick(image_bytes, buttons):
            if not OPENAI_API_KEY:
                raise SignFailure("OPENAI_API_KEY is missing; cannot solve image captcha")
            if not buttons:
                raise SignFailure("Captcha message does not include clickable options")
            from openai import AsyncOpenAI
            c = AsyncOpenAI(api_key=OPENAI_API_KEY, base_url=OPENAI_BASE_URL)
            b64  = base64.b64encode(image_bytes).decode()
            opts = "\n".join(f"- {b}" for b in buttons)
            resp = await c.chat.completions.create(
                model=OPENAI_MODEL,
                messages=[{"role": "user", "content": [
                    {"type": "image_url",
                     "image_url": {"url": f"data:image/jpeg;base64,{b64}"}},
                    {"type": "text",
                     "text": f"Look at the image and choose the best matching option below. Return only the option text.\n{opts}"}
                ]}],
                max_tokens=50,
            )
            answer = resp.choices[0].message.content.strip()
            if not answer:
                raise SignFailure("AI did not return a usable option")
            return answer

        async def download_image_bytes(app, msg):
            raw = await app.download_media(msg, in_memory=True)
            return raw.getvalue() if hasattr(raw, "getvalue") else bytes(raw)

        # Single chat sign-in flow
        async def sign_chat(app, chat_info):
            cid      = chat_info["chat_id"]
            name     = chat_info.get("name", str(cid))
            actions  = chat_info["actions"]
            interval = float(chat_info.get("action_interval", 1))
            msg_queues.setdefault(cid, asyncio.Queue())
            print(f"\n  [{name}]  id={cid}")

            for index, action in enumerate(actions, start=1):
                try:
                    t = int(action["action"])
                except (TypeError, ValueError) as e:
                    raise SignFailure(f"Step {index}: invalid action type {action['action']!r}") from e

                if t == 1:                               # Send text
                    text = action["text"]
                    await app.send_message(cid, text)
                    print(f"    [send] {text}")
                    await asyncio.sleep(interval)

                elif t == 3:                             # Click button
                    target = action["text"]
                    print(f"    [wait] button '{target}'")
                    msg = await next_msg(cid, timeout=45, need_markup=True)
                    if not msg:
                        raise SignFailure(f"Step {index}: timed out waiting for button '{target}'")
                    try:
                        result = await click_btn(app, msg, target)
                    except SoftSignWarning as e:
                        if index < len(actions):
                            print(f"    [warn] {e}")
                            result = target
                        else:
                            raise SignFailure(str(e)) from e
                    if result:
                        print(f"    [click] {result}")
                    else:
                        raise SignFailure(
                            f"Step {index}: button '{target}' not found; available: {get_buttons(msg.reply_markup)}"
                        )
                    await asyncio.sleep(interval)

                elif t == 4:                             # Use AI to solve captcha
                    print("    [wait] image captcha")
                    msg = await next_msg(cid, timeout=60, need_photo=True, need_markup=True)
                    if not msg:
                        raise SignFailure(f"Step {index}: no image captcha with buttons was received")
                    buttons = get_buttons(msg.reply_markup)
                    print(f"    [options] {buttons}")
                    img_bytes = await download_image_bytes(app, msg)
                    answer    = await ai_pick(img_bytes, buttons)
                    print(f"    [ai] {answer}")
                    result    = await click_btn(app, msg, answer)
                    if result:
                        print(f"    [click] {result}")
                    else:
                        raise SignFailure(
                            f"Step {index}: AI answer '{answer}' did not match any button; available: {buttons}"
                        )
                    await asyncio.sleep(interval)
                else:
                    raise SignFailure(f"Step {index}: unsupported action type {t}")

            return {"chat_id": cid, "name": name, "steps": len(actions)}

        # Main flow
        async def main():
            async with Client("my_account", session_string=SESSION_STRING, in_memory=True) as app:
                app.add_handler(MessageHandler(_on_msg))
                app.add_handler(EditedMessageHandler(_on_msg))
                successes = []
                failures = []
                requires_ai = any(
                    is_ai_action(action)
                    for cfg in TASK_MAP.values()
                    for chat in cfg.get("chats", [])
                    for action in chat.get("actions", [])
                )

                print("=== AI CONFIG ===")
                print(f"AI enabled: {AI_ENABLED}")
                print(f"AI model: {OPENAI_MODEL}")
                print(f"AI base url configured: {bool(OPENAI_BASE_URL)}")
                print(f"Tasks requiring AI: {requires_ai}")
                if requires_ai and not AI_ENABLED:
                    raise SystemExit("There are action=4 tasks but OPENAI_API_KEY is not configured")

                print("=== RESOLVE PEERS ===")
                for uname in BOT_USERNAMES:
                    try:
                        chat = await app.get_chat(uname)
                        msg_queues[chat.id] = asyncio.Queue()
                        print(f"  [ok] {uname} -> {chat.id}")
                    except Exception as e:
                        print(f"  [fail] {uname}: {e}")

                print("\n=== START TASKS ===")
                for task_name, cfg in TASK_MAP.items():
                    print(f"\nTask: {task_name}")
                    for chat_info in cfg.get("chats", []):
                        try:
                            result = await sign_chat(app, chat_info)
                            successes.append({"task": task_name, **result})
                            print(f"  [ok] completed: {result['name']}")
                        except Exception as e:
                            failures.append(
                                {
                                    "task": task_name,
                                    "chat_id": chat_info.get("chat_id"),
                                    "name": chat_info.get("name", str(chat_info.get("chat_id"))),
                                    "reason": str(e) or e.__class__.__name__,
                                }
                            )
                            print(f"  [fail] {chat_info.get('name', chat_info.get('chat_id'))} -> {e}")
                            traceback.print_exc()

                print("\n=== SUMMARY ===")
                print(f"Successes: {len(successes)}")
                for item in successes:
                    print(f"  - [{item['task']}] {item['name']} (chat_id={item['chat_id']})")

                print(f"Failures: {len(failures)}")
                for item in failures:
                    print(
                        f"  - [{item['task']}] {item['name']} (chat_id={item['chat_id']}): {item['reason']}"
                    )

                if failures:
                    raise SystemExit(f"Sign-in failed: {len(failures)} chat(s) failed")
                if not successes:
                    raise SystemExit("Sign-in failed: no chats completed successfully")

        asyncio.run(main())
        PYEOF
    - name: keep-actions-alive
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git commit --allow-empty -m "auto keep actions alive (no code change)"
        git push origin main
